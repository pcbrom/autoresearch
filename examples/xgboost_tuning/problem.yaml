objective: "minimize RMSE on California Housing via XGBoost autonomous tuning"
metric_name: rmse
metric_regex: '^rmse:\s+([\d.eE+-]+)'
lower_is_better: true

time_budget_s: 30
hard_timeout_s: 90

mutable_file: solution.py
readonly_files:
  - prepare.py
  - evaluate.py
runner: "python3 solution.py"

branch_prefix: hpsearch
results_tsv_columns: [commit, rmse, wall_s, status, description]

resource_metric_regex: '^wall_s:\s+([\d.]+)'
resource_metric_transform: identity

gemma_critic:
  enabled: true
  model: gemma4:e2b
  when: always
  thinking: true
  max_vram_gb: 8
  context_last_n: 10
  ollama_url: http://localhost:11434/v1

state:
  enabled: true
  throttle_seconds: 60
  rebuild_every_n_iter: 3
